services:
  web:
    image: nginx:alpine
    ports:
      - "${WEB_PORT:-8080}:80"
    volumes:
      - ./public:/usr/share/nginx/html:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  engine:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      FMP_API_KEY: ${FMP_API_KEY:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      ORACLE_DATE: ${ORACLE_DATE:-}
      OUTPUT_PATH: ${OUTPUT_PATH:-/app/public/daily_result.json}
      TICKERS_FILE: ${TICKERS_FILE:-/app/backend/tickers.txt}
    volumes:
      - ./public:/app/public
      - ./backend/tickers.txt:/app/backend/tickers.txt:ro
    profiles:
      - engine
